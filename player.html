<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">

<style>

.music-left audio{
display:none;
}

body{
margin:0;
background:transparent;
font-family: sans-serif;
}

/* mini player */

.player{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);

display:flex;
align-items:center;
gap:14px;

padding:12px 18px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);

border-radius:30px;
border:1px solid rgba(255,255,255,0.3);

color:white;
}

/* icon đĩa */

.disk{
width:38px;
height:38px;

border-radius:50%;
position:relative;

background:radial-gradient(circle at center,
#ff4d4d 8%,#111 10%,#000 40%,#222 42%,#000 60%);

border:2px solid rgba(255,255,255,0.4);

animation:spin 10s linear infinite;
animation-play-state:paused;
}

.disk::after{

content:"";

position:absolute;
top:6px;
left:50%;

width:4px;
height:4px;

background:white;
border-radius:50%;

transform:translateX(-50%);
opacity:0.8;

}

@keyframes spin{
from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

/* text */

.song{
font-size:14px;
white-space:nowrap;
}

/* button */

.playBtn{
width:34px;
height:34px;

border:none;
border-radius:50%;

background:#39d98a;
color:white;

cursor:pointer;
font-size:16px;
}

</style>
</head>


<body>

<div class="player">

<div class="disk" id="disk"></div>

<div class="song">
🎵 Gia vị cho sự chill
</div>

<button class="playBtn" id="playBtn">▶</button>

<audio id="music" autoplay loop>
<source src="bgm.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function(){
  document.getElementById("music").play();
});
</script>

</div>


<script>

const music=document.getElementById("music")
const btn=document.getElementById("playBtn")
const disk=document.getElementById("disk")

btn.onclick=function(){

if(music.paused){

music.play()
btn.innerHTML="⏸"
disk.style.animationPlayState="running"

}

else{

music.pause()
btn.innerHTML="▶"
disk.style.animationPlayState="paused"

}

}

</script>

</body>
</html>
